name: CSP Scraper

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node csp_scout.js
